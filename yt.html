<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ehliyet Cenk Hoca - Birebir Thumbnail Üretici v6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Tam YouTube Thumbnail Fontları -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Impact&family=Montserrat:wght@900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #1a1a1a; color: #fff; margin: 0; padding: 10px; display: flex; gap: 10px; height: 100vh; box-sizing: border-box; overflow: hidden; }

        /* Sol Menü Tasarımı */
        #sidebar { width: 360px; background-color: #222; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 12px; overflow-y: auto; height: 100%; border: 1px solid #333; }
        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-track { background: #1a1a1a; }
        #sidebar::-webkit-scrollbar-thumb { background: #ffcc00; border-radius: 4px;}

        h2 { margin-top: 0; margin-bottom: 5px; color: #ffcc00; font-size: 18px; text-align: center; font-weight: 900; letter-spacing: 1px; }
        
        .panel-section { background: #2a2a2a; padding: 12px; border-radius: 6px; border-left: 4px solid #ffcc00; display: flex; flex-direction: column; gap: 8px; }
        .section-title { font-size: 12px; color: #ffcc00; text-transform: uppercase; font-weight: bold; }
        .control-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        label { font-size: 11px; font-weight: bold; color: #ccc; flex: 1;}
        
        input[type="file"], select { width: 100%; background: #1a1a1a; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit;}
        input[type="color"] { width: 30px; height: 30px; border: none; cursor: pointer; background: transparent; padding: 0; }
        input[type="range"] { flex: 2; cursor: pointer; }
        input[type="number"] { width: 50px; background: #1a1a1a; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px; text-align: center; font-size: 12px; }

        button { background-color: #ffcc00; color: #000; border: none; padding: 10px; font-weight: 900; border-radius: 4px; cursor: pointer; transition: 0.2s; width: 100%; font-size: 13px; text-transform: uppercase;}
        button:hover { filter: brightness(1.1); }
        .btn-add { background-color: #00cc66; color: white; }
        .btn-danger { background-color: #ff3333; color: white; }
        .btn-template { background-color: #444; color: white; margin-top: 2px; font-size: 11px; padding: 8px;}
        .btn-template:hover { background-color: #ffcc00; color: #000;}
        .btn-download { background-color: #0073e6; color: white; font-size: 15px; padding: 12px;}
        
        /* Çalışma Alanı */
        #workspace-container { flex-grow: 1; overflow: auto; display: flex; justify-content: center; align-items: center; background-color: #111; border-radius: 8px; }
        
        #workspace { width: 1280px; height: 720px; background-color: #000; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transform-origin: center center; }
        #bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; }

        .draggable { position: absolute; z-index: 10; cursor: move; user-select: none; }
        .draggable.active::after { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px dashed #00cc66; pointer-events: none; }

        .text-wrapper { display: inline-block; transform-origin: left center; }
        .text-content { 
            font-size: 80px; 
            font-weight: normal; /* Anton fontu zaten kalındır */
            font-family: 'Anton', sans-serif; 
            color: #ffde00; 
            white-space: pre-wrap; 
            word-break: keep-all; 
            padding: 2px 5px; 
            outline: none; 
            line-height: 1; 
            text-align: left;
            -webkit-font-smoothing: antialiased;
        }
        .image-element { width: 200px; height: auto; }

        /* Şablon Izgarası */
        .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Cenk Hoca Studio</h2>
        
        <button class="btn-download" onclick="downloadThumbnail()">İndir (PNG)</button>

        <div class="panel-section">
            <div class="section-title">Arka Plan Resminiz</div>
            <input type="file" id="upload-bg" accept="image/*">
        </div>

        <div class="panel-section">
            <div class="section-title">Hazır Şablonlar (Birebir Tasarım)</div>
            <div class="template-grid">
                <button class="btn-template" onclick="applyTemplate(1)">1. Orijinal Sarı/Beyaz</button>
                <button class="btn-template" onclick="applyTemplate(2)">2. Orijinal Kırmızı</button>
                <button class="btn-template" onclick="applyTemplate(3)">3. Orijinal Yeşil</button>
                <button class="btn-template" onclick="applyTemplate(4)">4. Orijinal Mavi</button>
                <button class="btn-template" onclick="applyTemplate(5)">5. Dev Puanlı</button>
                <button class="btn-template" onclick="applyTemplate(6)">6. Ortalanmış</button>
            </div>
            <button class="btn-danger" style="margin-top:5px;" onclick="clearAllTexts()">Tüm Yazıları Sil</button>
        </div>

        <button class="btn-add" onclick="addText('YENİ YAZI')">+ YENİ YAZI EKLE</button>

        <div id="edit-controls" style="display: none; flex-direction: column; gap: 10px;">
            <hr style="border-color: #444; width: 100%;">
            <div class="section-title" style="text-align:center;">Seçili Öğeyi Düzenle</div>

            <div id="image-controls" class="panel-section" style="display: none;">
                <div class="control-row">
                    <label>Görsel Boyutu:</label>
                    <input type="range" id="image-size" min="50" max="1000" oninput="updateElement()">
                </div>
            </div>
            
            <div id="text-controls" style="display: none; flex-direction: column; gap: 8px;">
                
                <div class="panel-section">
                    <div class="section-title">Font & Boyut</div>
                    <select id="text-font" onchange="updateElement()">
                        <option value="'Anton', sans-serif">Anton (Görseldeki Font)</option>
                        <option value="'Impact', sans-serif">Impact (Klasik)</option>
                        <option value="'Montserrat', sans-serif">Montserrat (Kalın)</option>
                        <option value="'Oswald', sans-serif">Oswald</option>
                    </select>
                    <div class="control-row"><label>Boyut:</label><input type="range" id="text-size" min="30" max="350" oninput="updateElement()"></div>
                </div>

                <div class="panel-section">
                    <div class="section-title">Renk & Dış Çizgi</div>
                    <div class="control-row">
                        <label>Yazı Rengi:</label><input type="color" id="color-1" value="#ffde00" oninput="updateElement()">
                    </div>
                    <div class="control-row">
                        <label>Dış Çizgi (Siyah):</label><input type="range" id="stroke-width" min="0" max="20" value="8" oninput="updateElement()">
                        <input type="color" id="stroke-color" value="#000000" oninput="updateElement()">
                    </div>
                </div>

                <div class="panel-section">
                    <div class="section-title">Net Gölge (Drop Shadow)</div>
                    <div class="control-row">
                        <label>X-Y Yönü:</label>
                        <input type="number" id="shadow-x" value="10" oninput="updateElement()">
                        <input type="number" id="shadow-y" value="10" oninput="updateElement()">
                    </div>
                    <div class="control-row">
                        <label>Gölge Rengi:</label>
                        <input type="color" id="shadow-color" value="#000000" oninput="updateElement()">
                    </div>
                </div>

            </div>

            <button class="btn-danger" onclick="deleteActiveElement()">🗑️ Seçili Öğeyi Sil</button>
        </div>
    </div>

    <div id="workspace-container">
        <div id="workspace">
            <img id="bg-image" src="" alt="">
            <img id="avatar" src="avatar.png" class="draggable image-element" style="top: 80px; left: 800px; width: 450px;" onerror="this.style.display='none'">
            <img id="logo" src="logo.png" class="draggable image-element" style="top: 20px; left: 1050px; width: 200px;" onerror="this.style.display='none'">
        </div>
    </div>

    <script>
        const workspace = document.getElementById('workspace');
        let activeElement = null;
        let isDragging = false;
        let offsetX, offsetY;

        // Dinamik Ay Hesaplama
        const aylar = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
        const d = new Date();
        const dinamikAyMetni = `${aylar[d.getMonth()]} - ${aylar[(d.getMonth() + 1) % 12]}`;

        // Ölçekleme
        function scaleWorkspace() {
            const container = document.getElementById('workspace-container');
            const scale = Math.min((container.clientWidth - 40) / 1280, (container.clientHeight - 40) / 720);
            workspace.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleWorkspace); scaleWorkspace();

        document.getElementById('upload-bg').addEventListener('change', e => {
            if (e.target.files[0]) {
                const reader = new FileReader(); reader.onload = ev => document.getElementById('bg-image').src = ev.target.result;
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // Metin Ekleme
        function addText(textValue, config = {}) {
            const dragContainer = document.createElement('div');
            dragContainer.className = 'draggable text-container';
            dragContainer.style.top = config.top || '250px';
            dragContainer.style.left = config.left || '30px';

            const textWrapper = document.createElement('div');
            textWrapper.className = 'text-wrapper';
            
            const textContent = document.createElement('div');
            textContent.className = 'text-content';
            textContent.contentEditable = "true";
            textContent.innerText = textValue;
            textContent.spellcheck = false;

            const dt = dragContainer.dataset;
            dt.type = 'text';
            dt.font = config.font || "'Anton', sans-serif";
            dt.size = config.size || '100';
            dt.color1 = config.color1 || '#ffde00'; // Varsayılan Sarı
            dt.strokeW = config.strokeW !== undefined ? config.strokeW : '8';
            dt.strokeC = config.strokeC || '#000000';
            dt.shadowX = config.shadowX !== undefined ? config.shadowX : '8';
            dt.shadowY = config.shadowY !== undefined ? config.shadowY : '8';
            dt.shadowC = config.shadowC || '#000000';

            textWrapper.appendChild(textContent);
            dragContainer.appendChild(textWrapper);
            workspace.appendChild(dragContainer);
            
            makeDraggable(dragContainer);
            applyTextStyles(dragContainer);
            setActiveElement(dragContainer);

            textContent.addEventListener('dblclick', e => { textContent.focus(); document.execCommand('selectAll', false, null); });
        }

        // BİREBİR ŞABLON SİSTEMİ (Resimdeki ile Aynı Yapı)
        function clearAllTexts() { document.querySelectorAll('.text-container').forEach(e => e.remove()); removeActiveElement(); }

        function applyTemplate(id) {
            clearAllTexts();
            const f = "'Anton', sans-serif";
            const x = "30px"; // Tam sola dayalı
            const strkW = "10"; // Kalın siyah dış çizgi
            const shdX = "10"; // Sert sağ gölge
            const shdY = "10"; // Sert alt gölge

            const tpls = {
                1: [ // Orijinal Görseldeki Sarı / Beyaz Yapı
                    { text: "EHLİYET SINAV", top: "20px", left: x, size: "110", font: f, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "SORULARI 2026", top: "135px", left: x, size: "110", font: f, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: dinamikAyMetni, top: "250px", left: x, size: "150", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "Banko 50 Soru", top: "430px", left: x, size: "120", font: f, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "DETAYLI ANLATIM", top: "560px", left: x, size: "110", font: f, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                2: [ // Orijinal Kırmızı Varyasyon
                    { text: "EHLİYET SINAV", top: "20px", left: x, size: "110", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "SORULARI 2026", top: "135px", left: x, size: "110", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: dinamikAyMetni, top: "250px", left: x, size: "150", font: f, color1: "#ff2222", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "Banko 50 Soru", top: "430px", left: x, size: "120", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "DETAYLI ANLATIM", top: "560px", left: x, size: "110", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                3: [ // Orijinal Yeşil Varyasyon
                    { text: "EHLİYET SINAV", top: "20px", left: x, size: "110", font: f, color1: "#00ff66", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "SORULARI 2026", top: "135px", left: x, size: "110", font: f, color1: "#00ff66", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: dinamikAyMetni, top: "250px", left: x, size: "150", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "Banko 50 Soru", top: "430px", left: x, size: "120", font: f, color1: "#00ff66", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "DETAYLI ANLATIM", top: "560px", left: x, size: "110", font: f, color1: "#00ff66", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                4: [ // Orijinal Mavi Varyasyon
                    { text: "EHLİYET SINAV", top: "20px", left: x, size: "110", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "SORULARI 2026", top: "135px", left: x, size: "110", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: dinamikAyMetni, top: "250px", left: x, size: "150", font: f, color1: "#00aaff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "Banko 50 Soru", top: "430px", left: x, size: "120", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "DETAYLI ANLATIM", top: "560px", left: x, size: "110", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                5: [ // Banko Odaklı
                    { text: "EHLİYET SINAV", top: "20px", left: x, size: "100", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "SORULARI 2026", top: "130px", left: x, size: "100", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: dinamikAyMetni, top: "240px", left: x, size: "130", font: f, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "BANKO 50 SORU", top: "400px", left: x, size: "160", font: f, color1: "#ff3333", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "DETAYLI ANLATIM", top: "580px", left: x, size: "100", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                6: [ // Ortalanmış Versiyon (Alternatif)
                    { text: "EHLİYET SINAV SORULARI 2026", top: "40px", left: "100px", size: "80", font: f, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: dinamikAyMetni, top: "250px", left: "250px", size: "180", font: f, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: "BANKO 50 SORU - DETAYLI ANLATIM", top: "520px", left: "40px", size: "85", font: f, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ]
            };

            if(tpls[id]) tpls[id].forEach(conf => addText(conf.text, conf));
        }

        // Sürükleme Mantığı
        function makeDraggable(element) {
            if(!element.dataset.type && element.tagName === 'IMG') {
                element.dataset.type = 'image';
                element.addEventListener('dragstart', e => e.preventDefault());
            }
            
            element.addEventListener('mousedown', function(e) {
                if (e.target.isContentEditable && document.activeElement === e.target) return;
                setActiveElement(element);
                isDragging = true;
                const transformMatrix = window.getComputedStyle(workspace).transform;
                let scale = 1; if (transformMatrix !== 'none') scale = parseFloat(transformMatrix.split('(')[1].split(',')[0]);
                const rect = element.getBoundingClientRect();
                offsetX = (e.clientX - rect.left) / scale; offsetY = (e.clientY - rect.top) / scale;
                e.stopPropagation();
            });
        }

        document.addEventListener('mousemove', e => {
            if (isDragging && activeElement) {
                const transformMatrix = window.getComputedStyle(workspace).transform;
                let scale = 1; if (transformMatrix !== 'none') scale = parseFloat(transformMatrix.split('(')[1].split(',')[0]);
                const rect = workspace.getBoundingClientRect();
                activeElement.style.left = ((e.clientX - rect.left) / scale - offsetX) + 'px';
                activeElement.style.top = ((e.clientY - rect.top) / scale - offsetY) + 'px';
            }
        });
        document.addEventListener('mouseup', () => isDragging = false);
        workspace.addEventListener('mousedown', e => { if (e.target === workspace || e.target.id === 'bg-image') removeActiveElement(); });

        function setActiveElement(element) {
            document.querySelectorAll('.draggable').forEach(el => el.classList.remove('active'));
            activeElement = element;
            activeElement.classList.add('active');
            document.getElementById('edit-controls').style.display = 'flex';

            if (element.dataset.type === 'text') {
                document.getElementById('text-controls').style.display = 'flex';
                document.getElementById('image-controls').style.display = 'none';
                
                const d = element.dataset;
                document.getElementById('text-font').value = d.font;
                document.getElementById('text-size').value = d.size;
                document.getElementById('color-1').value = d.color1;
                document.getElementById('stroke-width').value = d.strokeW;
                document.getElementById('stroke-color').value = d.strokeC;
                document.getElementById('shadow-x').value = d.shadowX;
                document.getElementById('shadow-y').value = d.shadowY;
                document.getElementById('shadow-color').value = d.shadowC;
            } else {
                document.getElementById('text-controls').style.display = 'none';
                document.getElementById('image-controls').style.display = 'flex';
                document.getElementById('image-size').value = parseInt(element.offsetWidth);
            }
        }

        function removeActiveElement() { document.querySelectorAll('.draggable').forEach(el => el.classList.remove('active')); activeElement = null; document.getElementById('edit-controls').style.display = 'none'; }

        function updateElement() {
            if (!activeElement) return;
            if (activeElement.dataset.type === 'text') {
                const d = activeElement.dataset;
                d.font = document.getElementById('text-font').value;
                d.size = document.getElementById('text-size').value;
                d.color1 = document.getElementById('color-1').value;
                d.strokeW = document.getElementById('stroke-width').value;
                d.strokeC = document.getElementById('stroke-color').value;
                d.shadowX = document.getElementById('shadow-x').value;
                d.shadowY = document.getElementById('shadow-y').value;
                d.shadowC = document.getElementById('shadow-color').value;
                
                applyTextStyles(activeElement);
            } else activeElement.style.width = document.getElementById('image-size').value + 'px';
        }

        function applyTextStyles(element) {
            const d = element.dataset;
            const content = element.querySelector('.text-content');
            
            content.style.fontFamily = d.font; 
            content.style.fontSize = d.size + 'px'; 
            content.style.color = d.color1;
            
            // Keskin dış çizgi ve keskin gölge (Görseldeki mantık)
            content.style.webkitTextStroke = `${d.strokeW}px ${d.strokeC}`;
            content.style.textShadow = `${d.shadowX}px ${d.shadowY}px 0px ${d.shadowC}`;
        }

        function deleteActiveElement() { if (activeElement) { activeElement.remove(); removeActiveElement(); } }
        document.querySelectorAll('.draggable').forEach(makeDraggable);

        function downloadThumbnail() {
            removeActiveElement(); workspace.style.transform = 'scale(1)'; 
            html2canvas(workspace, { scale: 1, useCORS: true, backgroundColor: null, logging: false }).then(canvas => {
                const link = document.createElement('a'); link.download = `CenkHoca_Thumbnail_${dinamikAyMetni}.png`; link.href = canvas.toDataURL("image/png"); link.click(); scaleWorkspace(); 
            });
        }
    </script>
</body>
</html>
