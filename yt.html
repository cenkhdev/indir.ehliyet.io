<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ehliyet Cenk Hoca - Pro Thumbnail Üretici (Final)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Impact&family=Montserrat:wght@400;700;900&family=Oswald:wght@400;700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 10px; display: flex; gap: 10px; height: 100vh; box-sizing: border-box; overflow: hidden; }

        /* Sol Menü */
        #sidebar { width: 380px; background-color: #1e1e1e; padding: 15px; border-radius: 8px; box-shadow: 2px 0 15px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 12px; overflow-y: auto; height: 100%; border-right: 1px solid #333; }
        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-track { background: #121212; }
        #sidebar::-webkit-scrollbar-thumb { background: #ffcc00; border-radius: 4px;}

        h2 { margin: 0 0 5px 0; color: #ffcc00; font-size: 18px; text-align: center; font-weight: 900; }
        
        .panel-section { background: #252525; padding: 12px; border-radius: 6px; border-left: 4px solid #ffcc00; display: flex; flex-direction: column; gap: 8px; }
        .section-title { font-size: 11px; color: #ffcc00; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        .control-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        label { font-size: 11px; font-weight: bold; color: #bbb; flex: 1;}
        
        input[type="file"], select { width: 100%; background: #121212; color: white; border: 1px solid #444; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit;}
        input[type="color"] { width: 30px; height: 30px; border: none; cursor: pointer; background: transparent; padding: 0; }
        input[type="range"] { flex: 2; cursor: pointer; }
        input[type="number"] { width: 50px; background: #121212; color: white; border: 1px solid #444; padding: 4px; border-radius: 4px; text-align: center; font-size: 12px; }

        button { background-color: #ffcc00; color: #000; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s; width: 100%; font-size: 12px; text-transform: uppercase; font-family: inherit;}
        button:hover { filter: brightness(1.1); }
        .btn-add { background-color: #00cc66; color: white; }
        .btn-danger { background-color: #ff3333; color: white; }
        .btn-template { background-color: #333; color: white; margin-top: 2px; font-size: 11px; padding: 8px;}
        .btn-template:hover { background-color: #ffcc00; color: #000;}
        .btn-download { background-color: #0073e6; color: white; font-size: 15px; padding: 15px;}
        
        /* Çalışma Alanı */
        #workspace-container { flex-grow: 1; overflow: auto; display: flex; justify-content: center; align-items: center; background-color: #0a0a0a; border-radius: 8px; }
        
        #workspace { width: 1280px; height: 720px; background-color: #000; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transform-origin: center center; }
        #bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; }

        .draggable { position: absolute; z-index: 10; cursor: move; user-select: none; }
        .draggable.active::after { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px dashed #00cc66; pointer-events: none; }

        .text-wrapper { display: inline-block; transform-origin: left center; }
        .text-content { 
            font-size: 80px; 
            font-family: 'Anton', sans-serif; 
            color: #ffffff; 
            white-space: nowrap;
            padding: 5px 10px; 
            outline: none; 
            line-height: 1; 
            -webkit-font-smoothing: antialiased;
        }
        
        .image-element { width: auto; height: 150px; opacity: 1; visibility: visible; }
        
        .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Cenk Hoca Studio</h2>
        
        <!-- Max Çözünürlük İndirme Butonu -->
        <button class="btn-download" onclick="downloadThumbnail()">İndir (2K MAX Kalite)</button>

        <div class="panel-section">
            <div class="section-title">Arka Plan & Öğeler</div>
            <label>Arka Plan Resmi</label>
            <input type="file" id="upload-bg" accept="image/*">
            <label style="margin-top: 5px;">Avatar Değiştir</label>
            <input type="file" id="upload-avatar" accept="image/*">
            <label style="margin-top: 5px;">Logo Değiştir</label>
            <input type="file" id="upload-logo" accept="image/*">
        </div>

        <div class="panel-section">
            <div class="section-title">Şablonlar (Sağ Tarafa Ufak Eklenir)</div>
            <div class="template-grid">
                <button class="btn-template" onclick="applyTemplate(1)">1. Klasik Sarı/Beyaz</button>
                <button class="btn-template" onclick="applyTemplate(2)">2. Kutulu Ay (Kırmızı)</button>
                <button class="btn-template" onclick="applyTemplate(3)">3. Degrade Ateş (Sarı)</button>
                <button class="btn-template" onclick="applyTemplate(4)">4. Degrade Buz (Mavi)</button>
                <button class="btn-template" onclick="applyTemplate(5)">5. Montserrat Temiz</button>
                <button class="btn-template" onclick="applyTemplate(6)">6. Oswald Bold (Net)</button>
                <button class="btn-template" onclick="applyTemplate(7)">7. Siyah Kutulu Vurgu</button>
                <button class="btn-template" onclick="applyTemplate(8)">8. Genişlemiş (Yatay)</button>
                <button class="btn-template" onclick="applyTemplate(9)">9. İleri Eğik (Hız)</button>
                <button class="btn-template" onclick="applyTemplate(10)">10. Neon Gölgeli (Mavi)</button>
            </div>
            <button class="btn-danger" style="margin-top:5px;" onclick="clearAllTexts()">Tüm Yazıları Sil</button>
        </div>

        <button class="btn-add" onclick="addText('YENİ BAĞIMSIZ YAZI')">+ YENİ BAĞIMSIZ YAZI EKLE</button>

        <div id="edit-controls" style="display: none; flex-direction: column; gap: 10px;">
            <hr style="border-color: #333; width: 100%;">
            <div class="section-title" style="text-align:center;">Seçili Öğeyi Düzenle</div>

            <div id="image-controls" class="panel-section" style="display: none;">
                <div class="control-row">
                    <label>Görsel Boyutu (Yükseklik):</label>
                    <input type="range" id="image-size" min="50" max="1000" oninput="updateElement()">
                </div>
            </div>
            
            <div id="text-controls" style="display: none; flex-direction: column; gap: 8px;">
                
                <div class="panel-section">
                    <div class="section-title">Temel Font, Kalınlık & Boyut</div>
                    <select id="text-font" onchange="updateElement()">
                        <!-- YouTube Fontları -->
                        <optgroup label="YouTube Fontları">
                            <option value="'Oswald', sans-serif">Oswald (Net)</option>
                            <option value="'Montserrat', sans-serif">Montserrat (Modern)</option>
                            <option value="'Anton', sans-serif">Anton (Görseldeki)</option>
                            <option value="'Impact', sans-serif">Impact (Okunaklı)</option>
                            <option value="'Roboto', sans-serif">Roboto</option>
                        </optgroup>
                        <!-- Klasik Günlük Fontlar -->
                        <optgroup label="Klasik Fontlar">
                            <option value="Arial, sans-serif">Arial</option>
                            <option value="'Tahoma', sans-serif">Tahoma</option>
                            <option value="'Verdana', sans-serif">Verdana</option>
                            <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                            <option value="'Times New Roman', serif">Times New Roman</option>
                            <option value="'Comic Sans MS', cursive">Comic Sans MS</option>
                        </optgroup>
                    </select>
                    <div class="control-row">
                        <label>Kalınlık (Bold):</label>
                        <select id="text-weight" onchange="updateElement()">
                            <option value="normal">Normal (400)</option>
                            <option value="bold">Kalın (700)</option>
                            <option value="900">Ekstra Kalın (900)</option>
                        </select>
                    </div>
                    <div class="control-row"><label>Boyut:</label><input type="range" id="text-size" min="15" max="300" oninput="updateElement()"></div>
                </div>

                <div class="panel-section">
                    <div class="section-title">Renk & Degrade (Gradient)</div>
                    <select id="color-type" onchange="toggleColorType(); updateElement()">
                        <option value="solid">Tek Renk</option>
                        <option value="gradient">Degrade (İki Renk Geçişi)</option>
                    </select>
                    <div class="control-row">
                        <label>Renk 1:</label><input type="color" id="color-1" value="#ffde00" oninput="updateElement()">
                    </div>
                    <div class="control-row" id="color-2-row" style="display:none;">
                        <label>Renk 2:</label><input type="color" id="color-2" value="#ff5500" oninput="updateElement()">
                    </div>
                    <div class="control-row" id="gradient-angle-row" style="display:none;">
                        <label>Açı (°):</label><input type="range" id="gradient-angle" min="0" max="360" value="180" oninput="updateElement()">
                    </div>
                </div>

                <div class="panel-section">
                    <div class="section-title">Dış Çizgi & Gölge</div>
                    <div class="control-row">
                        <label>Dış Çizgi (Stroke):</label>
                        <input type="range" id="stroke-width" min="0" max="25" value="4" oninput="updateElement()">
                        <input type="color" id="stroke-color" value="#000000" oninput="updateElement()">
                    </div>
                    <div class="control-row">
                        <label>Gölge Konumu (X-Y):</label>
                        <input type="number" id="shadow-x" value="5" oninput="updateElement()">
                        <input type="number" id="shadow-y" value="5" oninput="updateElement()">
                    </div>
                    <div class="control-row">
                        <label>Gölge Bulanıklığı:</label>
                        <input type="range" id="shadow-blur" min="0" max="50" value="0" oninput="updateElement()">
                        <input type="color" id="shadow-color" value="#000000" oninput="updateElement()">
                    </div>
                </div>

                <div class="panel-section">
                    <div class="section-title">Metin Arka Plan Kutusu</div>
                    <div class="control-row">
                        <label>Kutu Kullan:</label><input type="checkbox" id="bg-enable" onchange="updateElement()">
                        <input type="color" id="bg-color" value="#cc0000" oninput="updateElement()">
                    </div>
                    <div id="bg-extra-controls" style="display: none; flex-direction: column; gap: 8px; margin-top:5px;">
                        <div class="control-row">
                            <label>Kutu Ovalliği:</label><input type="range" id="bg-radius" min="0" max="100" value="10" oninput="updateElement()">
                        </div>
                        <div class="control-row">
                            <label>Kutu Saydamlığı:</label><input type="range" id="bg-opacity" min="0" max="1" step="0.05" value="1" oninput="updateElement()">
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <div class="section-title">Şekillendirme (Uzunluk & Genişlik)</div>
                    <div class="control-row"><label>Genişlik (Yatay Uzat):</label><input type="range" id="scale-x" min="0.5" max="3" step="0.05" value="1" oninput="updateElement()"></div>
                    <div class="control-row"><label>Yükseklik (Dikey Uzat):</label><input type="range" id="scale-y" min="0.5" max="3" step="0.05" value="1" oninput="updateElement()"></div>
                    <div class="control-row"><label>Sağa Eğ (Skew X):</label><input type="range" id="skew-x" min="-45" max="45" value="0" oninput="updateElement()"></div>
                    <div class="control-row"><label>Döndür (°):</label><input type="range" id="rotate" min="-180" max="180" value="0" oninput="updateElement()"></div>
                </div>

            </div>

            <button class="btn-danger" onclick="deleteActiveElement()">🗑️ Seçili Öğeyi Sil</button>
        </div>
    </div>

    <div id="workspace-container">
        <div id="workspace">
            <img id="bg-image" src="" alt="">
            
            <img id="avatar" src="avatar.png" class="draggable image-element" style="top: 80px; left: 800px; height: 450px;">
            <img id="logo" src="logo.png" class="draggable image-element" style="top: 20px; left: 1050px; height: 200px;">
        </div>
    </div>

    <script>
        const workspace = document.getElementById('workspace');
        let activeElement = null;
        let isDragging = false;
        let offsetX, offsetY;

        // Dinamik Ay Hesaplama
        const aylar = ["OCAK", "ŞUBAT", "MART", "NİSAN", "MAYIS", "HAZİRAN", "TEMMUZ", "AĞUSTOS", "EYLÜL", "EKİM", "KASIM", "ARALIK"];
        const d = new Date();
        const dinamikAyMetni = `${aylar[d.getMonth()]} - ${aylar[(d.getMonth() + 1) % 12]}`;

        function hexToRgba(hex, opacity) {
            let r = parseInt(hex.substring(1, 3), 16), g = parseInt(hex.substring(3, 5), 16), b = parseInt(hex.substring(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        function scaleWorkspace() {
            const container = document.getElementById('workspace-container');
            const scale = Math.min((container.clientWidth - 40) / 1280, (container.clientHeight - 40) / 720);
            workspace.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleWorkspace); scaleWorkspace();

        function handleImageUpload(inputId, imgId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                if (e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        let img = document.getElementById(imgId);
                        img.src = ev.target.result;
                        img.style.display = 'block';
                        img.style.opacity = '1';
                    }
                    reader.readAsDataURL(e.target.files[0]);
                }
            });
        }
        handleImageUpload('upload-bg', 'bg-image');
        handleImageUpload('upload-avatar', 'avatar');
        handleImageUpload('upload-logo', 'logo');

        function addText(textValue, config = {}) {
            const dragContainer = document.createElement('div');
            dragContainer.className = 'draggable text-container';
            dragContainer.style.top = config.top || '100px';
            dragContainer.style.left = config.left || '800px';

            const textWrapper = document.createElement('div');
            textWrapper.className = 'text-wrapper';
            
            const textContent = document.createElement('div');
            textContent.className = 'text-content';
            textContent.contentEditable = "true";
            textContent.innerText = textValue;
            textContent.spellcheck = false;

            const dt = dragContainer.dataset;
            dt.type = 'text';
            dt.font = config.font || "'Anton', sans-serif";
            dt.weight = config.weight || 'normal';
            dt.size = config.size || '50';
            dt.colorType = config.colorType || 'solid';
            dt.color1 = config.color1 || '#ffffff';
            dt.color2 = config.color2 || '#ff5500';
            dt.angle = config.angle || '180';
            dt.strokeW = config.strokeW !== undefined ? config.strokeW : '4';
            dt.strokeC = config.strokeC || '#000000';
            dt.shadowX = config.shadowX !== undefined ? config.shadowX : '5';
            dt.shadowY = config.shadowY !== undefined ? config.shadowY : '5';
            dt.shadowBlur = config.shadowBlur || '0';
            dt.shadowC = config.shadowC || '#000000';
            dt.scaleX = config.scaleX || '1';
            dt.scaleY = config.scaleY || '1';
            dt.skewX = config.skewX || '0';
            dt.rotate = config.rotate || '0';
            dt.bgEnable = config.bgEnable || 'false';
            dt.bgColor = config.bgColor || '#cc0000';
            dt.bgRadius = config.bgRadius || '10'; 
            dt.bgOpacity = config.bgOpacity || '1';

            textWrapper.appendChild(textContent);
            dragContainer.appendChild(textWrapper);
            workspace.appendChild(dragContainer);
            
            makeDraggable(dragContainer);
            applyTextStyles(dragContainer);
            setActiveElement(dragContainer);

            textContent.addEventListener('dblclick', e => { textContent.focus(); document.execCommand('selectAll', false, null); });
        }

        function clearAllTexts() { document.querySelectorAll('.text-container').forEach(e => e.remove()); removeActiveElement(); }

        function applyTemplate(id) {
            clearAllTexts();
            const x = "820px"; // Sağ tarafa derli toplu yerleşim
            const strkW = "4"; 
            const shdX = "5"; 
            const shdY = "5";

            const fOswald = "'Oswald', sans-serif";
            const fMontserrat = "'Montserrat', sans-serif";
            const fImpact = "'Impact', sans-serif";
            const fAnton = "'Anton', sans-serif";

            const t1 = "Ehliyet Sınav Soruları 2026";
            const t2 = dinamikAyMetni;
            const t3 = "Banko 50 Soru";
            const t4 = "Detaylı Anlatım";

            // Ufaltılmış Boyutlar ve Sağ Konumlar
            const tps = { top1: "100px", top2: "160px", top3: "250px", top4: "310px" };
            const szs = { sz1: "40", sz2: "70", sz3: "45", sz4: "45" };

            const tpls = {
                1: [ // Klasik Sarı/Beyaz
                    { text: t1, top: tps.top1, left: x, size: szs.sz1, font: fAnton, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t2, top: tps.top2, left: x, size: szs.sz2, font: fAnton, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t3, top: tps.top3, left: x, size: szs.sz3, font: fAnton, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t4, top: tps.top4, left: x, size: szs.sz4, font: fAnton, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                2: [ // Kutulu Ay (Montserrat)
                    { text: t1, top: tps.top1, left: x, size: "38", font: fMontserrat, weight:"900", color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t2, top: tps.top2, left: x, size: "50", font: fMontserrat, weight:"900", color1: "#ffffff", strokeW: "0", bgEnable: "true", bgColor: "#cc0000", bgRadius: "10" },
                    { text: t3, top: "240px", left: x, size: szs.sz3, font: fMontserrat, weight:"900", color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t4, top: "295px", left: x, size: szs.sz4, font: fMontserrat, weight:"900", color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                3: [ // Degrade Ateş
                    { text: t1, top: tps.top1, left: x, size: szs.sz1, font: fOswald, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t2, top: tps.top2, left: x, size: szs.sz2, font: fAnton, colorType: "gradient", color1: "#ffde00", color2: "#ff3300", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t3, top: tps.top3, left: x, size: szs.sz3, font: fImpact, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t4, top: tps.top4, left: x, size: szs.sz4, font: fOswald, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                4: [ // Degrade Buz
                    { text: t1, top: tps.top1, left: x, size: szs.sz1, font: fAnton, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t2, top: tps.top2, left: x, size: szs.sz2, font: fAnton, colorType: "gradient", color1: "#00ffff", color2: "#0055ff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t3, top: tps.top3, left: x, size: szs.sz3, font: fAnton, color1: "#00ffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t4, top: tps.top4, left: x, size: szs.sz4, font: fAnton, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                5: [ // Montserrat Temiz
                    { text: t1, top: tps.top1, left: x, size: "38", font: fMontserrat, weight:"bold", color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t2, top: tps.top2, left: x, size: "65", font: fMontserrat, weight:"900", color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t3, top: tps.top3, left: x, size: szs.sz3, font: fMontserrat, weight:"bold", color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t4, top: tps.top4, left: x, size: szs.sz4, font: fMontserrat, weight:"bold", color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                6: [ // Oswald Bold
                    { text: t1, top: tps.top1, left: x, size: szs.sz1, font: fOswald, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t2, top: tps.top2, left: x, size: szs.sz2, font: fOswald, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t3, top: tps.top3, left: x, size: szs.sz3, font: fOswald, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t4, top: tps.top4, left: x, size: szs.sz4, font: fOswald, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY }
                ],
                7: [ // Siyah Kutulu Vurgu
                    { text: t1, top: tps.top1, left: x, size: szs.sz1, font: fOswald, color1: "#ffde00", strokeW: "0", bgEnable: "true", bgColor: "#000000", bgOpacity: "0.8" },
                    { text: t2, top: "155px", left: x, size: szs.sz2, font: fOswald, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY },
                    { text: t3, top: "255px", left: x, size: szs.sz3, font: fOswald, color1: "#ffde00", strokeW: "0", bgEnable: "true", bgColor: "#000000", bgOpacity: "0.8" },
                    { text: t4, top: "315px", left: x, size: szs.sz4, font: fOswald, color1: "#ffffff", strokeW: "0", bgEnable: "true", bgColor: "#000000", bgOpacity: "0.8" }
                ],
                8: [ // Genişlemiş (Yatay Sünmüş)
                    { text: t1, top: tps.top1, left: x, size: szs.sz1, font: fOswald, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY, scaleX: "1.2" },
                    { text: t2, top: tps.top2, left: x, size: szs.sz2, font: fAnton, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY, scaleX: "1.2" },
                    { text: t3, top: tps.top3, left: x, size: szs.sz3, font: fOswald, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY, scaleX: "1.2" },
                    { text: t4, top: tps.top4, left: x, size: szs.sz4, font: fOswald, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY, scaleX: "1.2" }
                ],
                9: [ // İleri Eğik (Hız)
                    { text: t1, top: tps.top1, left: x, size: szs.sz1, font: fOswald, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY, skewX: "-10" },
                    { text: t2, top: tps.top2, left: x, size: szs.sz2, font: fImpact, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY, skewX: "-10" },
                    { text: t3, top: tps.top3, left: x, size: szs.sz3, font: fOswald, color1: "#ffde00", strokeW: strkW, shadowX: shdX, shadowY: shdY, skewX: "-10" },
                    { text: t4, top: tps.top4, left: x, size: szs.sz4, font: fOswald, color1: "#ffffff", strokeW: strkW, shadowX: shdX, shadowY: shdY, skewX: "-10" }
                ],
                10: [ // Neon Gölgeli
                    { text: t1, top: tps.top1, left: x, size: szs.sz1, font: fAnton, color1: "#ffffff", strokeW: "2", shadowX: "0", shadowY: "0", shadowBlur:"15", shadowC: "#00aaff" },
                    { text: t2, top: tps.top2, left: x, size: szs.sz2, font: fAnton, colorType: "gradient", color1: "#ffffff", color2: "#00aaff", strokeW: "2", shadowX: "0", shadowY: "0", shadowBlur:"20", shadowC: "#00aaff" },
                    { text: t3, top: tps.top3, left: x, size: szs.sz3, font: fAnton, color1: "#ffffff", strokeW: "2", shadowX: "0", shadowY: "0", shadowBlur:"15", shadowC: "#00aaff" },
                    { text: t4, top: tps.top4, left: x, size: szs.sz4, font: fAnton, color1: "#ffffff", strokeW: "2", shadowX: "0", shadowY: "0", shadowBlur:"15", shadowC: "#00aaff" }
                ]
            };

            if(tpls[id]) tpls[id].forEach(conf => addText(conf.text, conf));
        }

        function toggleColorType() {
            const type = document.getElementById('color-type').value;
            document.getElementById('color-2-row').style.display = (type === 'gradient') ? 'flex' : 'none';
            document.getElementById('gradient-angle-row').style.display = (type === 'gradient') ? 'flex' : 'none';
        }

        function makeDraggable(element) {
            if(!element.dataset.type && element.tagName === 'IMG') {
                element.dataset.type = 'image';
                element.addEventListener('dragstart', e => e.preventDefault());
            }
            
            element.addEventListener('mousedown', function(e) {
                if (e.target.isContentEditable && document.activeElement === e.target) return;
                setActiveElement(element);
                isDragging = true;
                const transformMatrix = window.getComputedStyle(workspace).transform;
                let scale = 1; if (transformMatrix !== 'none') scale = parseFloat(transformMatrix.split('(')[1].split(',')[0]);
                const rect = element.getBoundingClientRect();
                offsetX = (e.clientX - rect.left) / scale; offsetY = (e.clientY - rect.top) / scale;
                e.stopPropagation();
            });
        }

        document.addEventListener('mousemove', e => {
            if (isDragging && activeElement) {
                const transformMatrix = window.getComputedStyle(workspace).transform;
                let scale = 1; if (transformMatrix !== 'none') scale = parseFloat(transformMatrix.split('(')[1].split(',')[0]);
                const rect = workspace.getBoundingClientRect();
                activeElement.style.left = ((e.clientX - rect.left) / scale - offsetX) + 'px';
                activeElement.style.top = ((e.clientY - rect.top) / scale - offsetY) + 'px';
            }
        });
        document.addEventListener('mouseup', () => isDragging = false);
        workspace.addEventListener('mousedown', e => { if (e.target === workspace || e.target.id === 'bg-image') removeActiveElement(); });

        function setActiveElement(element) {
            document.querySelectorAll('.draggable').forEach(el => el.classList.remove('active'));
            activeElement = element;
            activeElement.classList.add('active');
            document.getElementById('edit-controls').style.display = 'flex';

            if (element.dataset.type === 'text') {
                document.getElementById('text-controls').style.display = 'flex';
                document.getElementById('image-controls').style.display = 'none';
                
                const d = element.dataset;
                document.getElementById('text-font').value = d.font;
                document.getElementById('text-weight').value = d.weight;
                document.getElementById('text-size').value = d.size;
                document.getElementById('color-type').value = d.colorType;
                document.getElementById('color-1').value = d.color1;
                document.getElementById('color-2').value = d.color2;
                document.getElementById('gradient-angle').value = d.angle;
                document.getElementById('stroke-width').value = d.strokeW;
                document.getElementById('stroke-color').value = d.strokeC;
                document.getElementById('shadow-x').value = d.shadowX;
                document.getElementById('shadow-y').value = d.shadowY;
                document.getElementById('shadow-blur').value = d.shadowBlur;
                document.getElementById('shadow-color').value = d.shadowC;
                document.getElementById('scale-x').value = d.scaleX;
                document.getElementById('scale-y').value = d.scaleY;
                document.getElementById('skew-x').value = d.skewX;
                document.getElementById('rotate').value = d.rotate;
                document.getElementById('bg-enable').checked = (d.bgEnable === 'true');
                document.getElementById('bg-color').value = d.bgColor;
                document.getElementById('bg-radius').value = d.bgRadius;
                document.getElementById('bg-opacity').value = d.bgOpacity; 
                
                toggleColorType();
                document.getElementById('bg-extra-controls').style.display = (d.bgEnable === 'true') ? 'flex' : 'none';
            } else {
                document.getElementById('text-controls').style.display = 'none';
                document.getElementById('image-controls').style.display = 'flex';
                document.getElementById('image-size').value = parseInt(window.getComputedStyle(element).height);
            }
        }

        function removeActiveElement() { document.querySelectorAll('.draggable').forEach(el => el.classList.remove('active')); activeElement = null; document.getElementById('edit-controls').style.display = 'none'; }

        function updateElement() {
            if (!activeElement) return;
            if (activeElement.dataset.type === 'text') {
                const d = activeElement.dataset;
                d.font = document.getElementById('text-font').value;
                d.weight = document.getElementById('text-weight').value;
                d.size = document.getElementById('text-size').value;
                d.colorType = document.getElementById('color-type').value;
                d.color1 = document.getElementById('color-1').value;
                d.color2 = document.getElementById('color-2').value;
                d.angle = document.getElementById('gradient-angle').value;
                d.strokeW = document.getElementById('stroke-width').value;
                d.strokeC = document.getElementById('stroke-color').value;
                d.shadowX = document.getElementById('shadow-x').value;
                d.shadowY = document.getElementById('shadow-y').value;
                d.shadowBlur = document.getElementById('shadow-blur').value;
                d.shadowC = document.getElementById('shadow-color').value;
                d.scaleX = document.getElementById('scale-x').value;
                d.scaleY = document.getElementById('scale-y').value;
                d.skewX = document.getElementById('skew-x').value;
                d.rotate = document.getElementById('rotate').value;
                d.bgEnable = document.getElementById('bg-enable').checked;
                d.bgColor = document.getElementById('bg-color').value;
                d.bgRadius = document.getElementById('bg-radius').value;
                d.bgOpacity = document.getElementById('bg-opacity').value; 
                
                applyTextStyles(activeElement);
                document.getElementById('bg-extra-controls').style.display = (d.bgEnable === 'true') ? 'flex' : 'none';
            } else {
                activeElement.style.height = document.getElementById('image-size').value + 'px';
                activeElement.style.width = 'auto'; 
            }
        }

        function applyTextStyles(element) {
            const d = element.dataset;
            const wrapper = element.querySelector('.text-wrapper');
            const content = element.querySelector('.text-content');
            
            content.style.fontFamily = d.font; 
            content.style.fontWeight = d.weight;
            content.style.fontSize = d.size + 'px'; 
            
            content.style.webkitTextStroke = `${d.strokeW}px ${d.strokeC}`;
            
            if (d.colorType === 'solid') { 
                content.style.background = 'none'; 
                content.style.webkitBackgroundClip = 'unset'; 
                content.style.webkitTextFillColor = 'unset'; 
                content.style.color = d.color1;
            } else { 
                content.style.background = `linear-gradient(${d.angle}deg, ${d.color1}, ${d.color2})`; 
                content.style.webkitBackgroundClip = 'text'; 
                content.style.webkitTextFillColor = 'transparent'; 
                content.style.color = 'transparent'; 
            }
            
            content.style.filter = `drop-shadow(${d.shadowX}px ${d.shadowY}px ${d.shadowBlur}px ${d.shadowC})`;
            
            wrapper.style.transform = `scaleX(${d.scaleX}) scaleY(${d.scaleY}) skewX(${d.skewX}deg) rotate(${d.rotate}deg)`;
            
            if (d.bgEnable === 'true') { 
                wrapper.style.backgroundColor = hexToRgba(d.bgColor, d.bgOpacity); 
                wrapper.style.padding = '5px 20px'; 
                wrapper.style.borderRadius = d.bgRadius + 'px'; 
            } else { 
                wrapper.style.backgroundColor = 'transparent'; 
                wrapper.style.padding = '0'; 
                wrapper.style.borderRadius = '0'; 
            }
        }

        function deleteActiveElement() { if (activeElement) { activeElement.remove(); removeActiveElement(); } }
        document.querySelectorAll('.draggable').forEach(makeDraggable);

        function downloadThumbnail() {
            removeActiveElement(); workspace.style.transform = 'scale(1)'; 
            // Scale: 2 => 2560x1440 MAX Kalite Çıktı
            html2canvas(workspace, { scale: 2, useCORS: true, backgroundColor: null, logging: false }).then(canvas => {
                const link = document.createElement('a'); link.download = `CenkHoca_Thumbnail_${dinamikAyMetni}_2K.png`; link.href = canvas.toDataURL("image/png"); link.click(); scaleWorkspace(); 
            });
        }
    </script>
</body>
